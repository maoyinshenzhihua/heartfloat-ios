name: Build iOS App (HeartFloat)

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

env:
  XCODE_VERSION: '15.0'
  IOS_DEPLOYMENT_TARGET: '15.0'
  BUNDLE_ID: com.heartfloat.app
  SCHEME: HeartFloat

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Generate Xcode project
        working-directory: ./ios/HeartFloat
        run: |
          if which xcodegen >/dev/null; then
            echo "XcodeGen is already installed"
          else
            brew install xcodegen
          fi
          xcodegen generate

      - name: Fix project format
        working-directory: ./ios/HeartFloat
        run: |
          if [ -f "HeartFloat.xcodeproj/project.pbxproj" ]; then
            sed -i '' 's/objectVersion = 77;/objectVersion = 56;/g' HeartFloat.xcodeproj/project.pbxproj
            sed -i '' 's/compatibilityVersion = "Xcode 14.0";/compatibilityVersion = "Xcode 13.0";/g' HeartFloat.xcodeproj/project.pbxproj
          fi

      - name: Build
        working-directory: ./ios/HeartFloat
        run: |
          xcodebuild -project HeartFloat.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData/HeartFloat-${{ github.run_number }} \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA
        run: |
          mkdir -p output
          APP_PATH=~/Library/Developer/Xcode/DerivedData/HeartFloat-${{ github.run_number }}/Build/Products/Release-iphoneos/HeartFloat.app
          echo "Using app at: $APP_PATH"
          if [ -d "$APP_PATH" ]; then
            ls -la "$APP_PATH"
            cp -r "$APP_PATH" ./output/
            cd ./output
            mkdir -p Payload
            cp -r HeartFloat.app Payload/
            zip -r ./HeartFloat-${{ github.run_number }}.ipa Payload
            ls -la
            echo "IPA created successfully"
          else
            echo "App not found at: $APP_PATH"
            find ~/Library/Developer/Xcode/DerivedData -name "HeartFloat.app" -type d 2>/dev/null
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-iOS-${{ github.run_number }}
          path: output/HeartFloat-${{ github.run_number }}.ipa
          retention-days: 30
