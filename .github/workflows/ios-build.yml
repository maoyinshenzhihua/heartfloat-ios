name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: List Project Structure
        run: |
          ls -la
          ls -la HeartFloat/
          ls -la HeartFloat/Resources/

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project HeartFloat.xcodeproj \
            -scheme HeartFloat \
            -configuration Release \
            -archivePath build/HeartFloat.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: List Archive Contents
        run: |
          ls -la build/
          ls -la build/HeartFloat.xcarchive/
          ls -la build/HeartFloat.xcarchive/Products/Applications/
          ls -la build/HeartFloat.xcarchive/Products/Applications/HeartFloat.app/

      - name: Create IPA from Archive
        run: |
          mkdir -p build/ipa
          cd build/ipa
          mkdir -p Payload
          cp -r "../HeartFloat.xcarchive/Products/Applications/HeartFloat.app" Payload/
          
          echo "=== Payload contents ==="
          ls -la Payload/
          ls -la Payload/HeartFloat.app/
          
          echo "=== Creating IPA ==="
          zip -r HeartFloat.ipa Payload
          rm -rf Payload
          ls -la

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-iOS
          path: build/ipa/HeartFloat.ipa
          retention-days: 30

      - name: Create Build Summary
        if: success()
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: HeartFloat" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **IPA Size**: $(du -h build/ipa/HeartFloat.ipa | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download IPA" >> $GITHUB_STEP_SUMMARY
          echo "You can download the IPA file from the Artifacts section below." >> $GITHUB_STEP_SUMMARY