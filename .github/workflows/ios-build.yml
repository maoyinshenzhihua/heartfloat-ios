name: Build iOS IPA
 
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
 
jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-latest
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
 
      - name: Install Dependencies
        run: |
          # Install XcodeGen if project.yml exists
          if [ -f "project.yml" ]; then
            brew install xcodegen
            xcodegen generate
          fi
          
          # Install CocoaPods if Podfile exists
          if [ -f "Podfile" ]; then
            pod install --repo-update
          fi
 
      - name: Build Archive
        run: |
          # Build the archive
          xcodebuild archive \
            -project HeartFloat.xcodeproj \
            -scheme HeartFloat \
            -configuration Release \
            -archivePath build/HeartFloat.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
 
      - name: Export IPA
        run: |
          # Export the IPA
          xcodebuild -exportArchive \
            -archivePath build/HeartFloat.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
 
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-iOS
          path: build/ipa/*.ipa
          retention-days: 30
      - name: Upload dSYMs (if exists)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: HeartFloat-dSYMs
          path: build/ipa/*.dSYM
          retention-days: 30
      - name: Create Build Summary
        if: success()
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: HeartFloat" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **IPA Size**: $(du -h build/ipa/*.ipa | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download IPA" >> $GITHUB_STEP_SUMMARY
          echo "You can download the IPA file from the Artifacts section below." >> $GITHUB_STEP_SUMMARY