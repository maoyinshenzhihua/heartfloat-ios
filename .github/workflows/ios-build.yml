name: Build iOS App

on:
  push:
    branches: [ main ]
    paths:
      - 'HeartFloat/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'HeartFloat/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List project structure
        run: |
          ls -la
          ls -la HeartFloat/
          ls -la HeartFloat/Resources/
          ls -la HeartFloat/Resources/Assets.xcassets/

      - name: Archive iOS App
        run: |
          xcodebuild -project HeartFloat.xcodeproj \
            -scheme HeartFloat \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            clean archive \
            -archivePath $PWD/build/HeartFloat.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: List archive contents
        run: |
          ls -la build/
          ls -la build/HeartFloat.xcarchive/
          ls -la build/HeartFloat.xcarchive/Products/Applications/

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/HeartFloat.xcarchive \
            -exportPath $PWD/build/ \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: List export contents
        run: |
          ls -la build/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-iOS
          path: build/HeartFloat.ipa
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ✅ iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** [Download IPA](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📱 Note: This build is unsigned. For installation on real devices, you need to sign the app with your Apple Developer certificate." >> $GITHUB_STEP_SUMMARY
