name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: List Project Structure
        run: |
          ls -la
          ls -la HeartFloat/
          ls -la HeartFloat/Resources/

      - name: Build App
        run: |
          xcodebuild -project HeartFloat.xcodeproj \
            -scheme HeartFloat \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DSTROOT=$PWD/build \
            INSTALL_PATH=/Applications

      - name: Find Built App
        id: find-app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "HeartFloat.app" -type d 2>/dev/null | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Create IPA
        run: |
          mkdir -p build/ipa
          cd build/ipa
          mkdir -p Payload
          cp -r "${{ steps.find-app.outputs.app_path }}" Payload/
          ls -la Payload/
          ls -la Payload/HeartFloat.app/
          zip -r HeartFloat.ipa Payload
          rm -rf Payload
          ls -la

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-iOS
          path: build/ipa/HeartFloat.ipa
          retention-days: 30

      - name: Create Build Summary
        if: success()
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: HeartFloat" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **IPA Size**: $(du -h build/ipa/HeartFloat.ipa | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download IPA" >> $GITHUB_STEP_SUMMARY
          echo "You can download the IPA file from the Artifacts section below." >> $GITHUB_STEP_SUMMARY