name: Build iOS App (HeartFloat)

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

env:
  XCODE_VERSION: '15.0'
  IOS_DEPLOYMENT_TARGET: '14.0'
  BUNDLE_ID: com.heartfloat.app
  SCHEME: HeartFloat

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Generate Xcode project
        working-directory: ./ios/HeartFloat
        run: |
          if which xcodegen >/dev/null; then
            echo "XcodeGen is already installed"
          else
            brew install xcodegen
          fi
          xcodegen generate

      - name: Fix project format
        working-directory: ./ios/HeartFloat
        run: |
          find . -name "*.pbxproj" -exec sed -i '' 's/77/56/g' {} \;

      - name: Build
        working-directory: ./ios/HeartFloat
        run: |
          xcodebuild -project HeartFloat.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA
        id: create_ipa
        working-directory: ./ios/HeartFloat
        env:
          SCHEME: HeartFloat
        run: |
          mkdir -p output
          APP_PATH=$(xcodebuild -project HeartFloat.xcodeproj -scheme $SCHEME -showBuildSettings 2>/dev/null | grep -E "BUILT_PRODUCTS_DIR|BUILD_DIR" | head -2)
          echo "Build settings: $APP_PATH"
          APP_BUILT_PATH=$(xcodebuild -project HeartFloat.xcodeproj -scheme $SCHEME -showBuildSettings 2>/dev/null | grep "BUILT_PRODUCTS_DIR" | awk -F'= ' '{print $2}' | tr -d ' ')
          FULL_APP_PATH="$APP_BUILT_PATH/${SCHEME}.app"
          echo "Looking for app at: $FULL_APP_PATH"
          if [ -d "$FULL_APP_PATH" ]; then
            cp -r "$FULL_APP_PATH" ./output/
            cd ./output
            mkdir -p Payload
            cp -r ${SCHEME}.app Payload/
            zip -r ./${SCHEME}-${{ github.run_number }}.ipa Payload
            echo "IPA created successfully"
            ls -la
          else
            echo "App not found at: $FULL_APP_PATH"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-iOS-${{ github.run_number }}
          path: ios/HeartFloat/output/HeartFloat-${{ github.run_number }}.ipa
          retention-days: 30
