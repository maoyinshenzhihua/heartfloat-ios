name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.0'

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Show available simulators
      run: xcrun simctl list devices available

    - name: Create simulator
      run: |
        xcrun simctl boot "iPhone 16" || xcrun simctl create com.apple.CoreSimulator.SimDevice.iPhone-16 "com.apple.CoreSimulator.SimRuntime.iOS-18-0" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" || echo "Using generic platform"

    - name: Install XcodeGen
      run: |
        which xcodegen || brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Install CocoaPods
      run: pod install

    - name: Build iOS Project
      run: |
        xcodebuild -workspace HeartFloat.xcworkspace \
          -scheme HeartFloat \
          -configuration Debug \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGNING_ALLOWED=NO \
          build

    - name: Build IPA (Release)
      run: |
        mkdir -p build
        xcodebuild -workspace HeartFloat.xcworkspace \
          -scheme HeartFloat \
          -configuration Release \
          -sdk iphoneos \
          -archivePath build/HeartFloat.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          archive

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/HeartFloat.xcarchive \
          -exportPath build/ipa \
          -exportOptionsPlist ExportOptions.plist

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HeartFloat.ipa
        path: build/ipa/*.ipa
        retention-days: 7

    - name: Upload xcarchive
      uses: actions/upload-artifact@v4
      with:
        name: HeartFloat.xcarchive
        path: build/HeartFloat.xcarchive
        retention-days: 7