name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.4'

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Show available simulators
      run: xcrun simctl list devices available

    - name: Install XcodeGen
      run: |
        which xcodegen || brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build iOS Project (Debug)
      run: |
        xcodebuild -project HeartFloat.xcodeproj \
          -scheme HeartFloat \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone SE (3rd generation),OS=18.5' \
          -derivedDataPath ./DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          build

    - name: Create IPA from built app
      run: |
        mkdir -p build
        cp -R ./DerivedData/Build/Products/Debug-iphonesimulator/HeartFloat.app Payload/
        cd Payload && zip -r ../build/HeartFloat.ipa .
        cd ..
        rm -rf Payload
        ls -la build/

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HeartFloat.ipa
        path: build/HeartFloat.ipa
        retention-days: 7