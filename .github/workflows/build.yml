name: Build HeartFloat iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_NAME: HeartFloat
  BUNDLE_ID: com.heartfloat.HeartFloat
  IOS_VERSION: '15.0'
  MARKETING_VERSION: '1.0'
  CURRENT_PROJECT_VERSION: '1'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Xcode version
        run: xcodebuild -version

      - name: Check available simulators
        run: xcrun simctl list devices available | head -30

      - name: Install Ruby dependencies
        run: |
          if [ -f "Gemfile" ]; then
            bundle install
          fi

      - name: Install CocoaPods dependencies
        run: |
          if [ -f "Podfile" ]; then
            pod install --repo-update
          fi

      - name: Set up code signing
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          if [ "${{ secrets.CERTIFICATE_DATA }}" != "" ]; then
            echo "${{ secrets.CERTIFICATE_DATA }}" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/Certificates.p12
          fi
          if [ "${{ secrets.CERTIFICATE_PWD }}" != "" ]; then
            CERTIFICATE_PWD="${{ secrets.CERTIFICATE_PWD }}"
          fi

      - name: Import certificate
        if: env.CERTIFICATE_DATA != ''
        run: |
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db || true
          security set-keychain-settings ~/Library/Keychains/login.keychain-db || true
          if [ -f ~/Library/MobileDevice/Provisioning\ Profiles/Certificates.p12 ]; then
            security import ~/Library/MobileDevice/Provisioning\ Profiles/Certificates.p12 -P "${{ secrets.CERTIFICATE_PWD }}" -T /usr/bin/codesign -T /usr/bin/security || true
          fi

      - name: Generate project
        run: |
          if [ -f "project.yml" ] && [ ! -f "${{ env.PROJECT_NAME }}.xcodeproj" ]; then
            brew install xcodegen
            xcodegen generate
          fi

      - name: Build project
        run: |
          DEVEL_TEAM="${{ secrets.DEVELOPMENT_TEAM }}"
          if [ -f "Podfile" ]; then
            xcodebuild -workspace ${{ env.PROJECT_NAME }}.xcworkspace -scheme ${{ env.PROJECT_NAME }} -configuration Release -destination 'generic/platform=iOS' -archivePath build/${{ env.PROJECT_NAME }}.xcarchive archive DEVELOPMENT_TEAM="$DEVEL_TEAM" PRODUCT_BUNDLE_IDENTIFIER=${{ env.BUNDLE_ID }} MARKETING_VERSION=${{ env.MARKETING_VERSION }} CURRENT_PROJECT_VERSION=${{ env.CURRENT_PROJECT_VERSION }}
          else
            xcodebuild -project ${{ env.PROJECT_NAME }}.xcodeproj -scheme ${{ env.PROJECT_NAME }} -configuration Release -destination 'generic/platform=iOS' -archivePath build/${{ env.PROJECT_NAME }}.xcarchive archive DEVELOPMENT_TEAM="$DEVEL_TEAM" PRODUCT_BUNDLE_IDENTIFIER=${{ env.BUNDLE_ID }} MARKETING_VERSION=${{ env.MARKETING_VERSION }} CURRENT_PROJECT_VERSION=${{ env.CURRENT_PROJECT_VERSION }}
          fi

      - name: Export IPA
        run: |
          mkdir -p build
          DEVEL_TEAM="${{ secrets.DEVELOPMENT_TEAM }}"
          if [ -f "ExportOptions.plist" ]; then
            if [ -n "$DEVEL_TEAM" ]; then
              xcodebuild -exportArchive -archivePath build/${{ env.PROJECT_NAME }}.xcarchive -exportPath build -exportOptionsPlist ExportOptions.plist DEVELOPMENT_TEAM="$DEVEL_TEAM"
            else
              xcodebuild -exportArchive -archivePath build/${{ env.PROJECT_NAME }}.xcarchive -exportPath build -exportOptionsPlist ExportOptions.plist
            fi
          else
            if [ -n "$DEVEL_TEAM" ]; then
              xcodebuild -exportArchive -archivePath build/${{ env.PROJECT_NAME }}.xcarchive -exportPath build -exportOptionsPlist /dev/null DEVELOPMENT_TEAM="$DEVEL_TEAM" -allowProvisioningUpdates
            else
              xcodebuild -exportArchive -archivePath build/${{ env.PROJECT_NAME }}.xcarchive -exportPath build -exportOptionsPlist /dev/null -allowProvisioningUpdates
            fi
          fi

      - name: Verify IPA exists
        run: |
          if [ -f "build/${{ env.PROJECT_NAME }}.ipa" ]; then
            echo "IPA file created successfully!"
            ls -lh build/${{ env.PROJECT_NAME }}.ipa
          else
            echo "Warning: IPA file not found, checking build folder..."
            ls -la build/
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-ipa
          path: build/${{ env.PROJECT_NAME }}.ipa
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/**/*.log
          retention-days: 7
