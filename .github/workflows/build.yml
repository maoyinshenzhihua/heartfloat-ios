name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.4'

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Show available simulators
      run: xcrun simctl list devices available

    - name: Install XcodeGen
      run: |
        which xcodegen || brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build iOS Project
      run: |
        xcodebuild -project HeartFloat.xcodeproj \
          -scheme HeartFloat \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=18.5' \
          CODE_SIGNING_ALLOWED=NO \
          build

    - name: Build IPA (Release)
      run: |
        mkdir -p build
        xcodebuild -project HeartFloat.xcodeproj \
          -scheme HeartFloat \
          -configuration Release \
          -sdk iphoneos \
          -archivePath build/HeartFloat.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          archive

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/HeartFloat.xcarchive \
          -exportPath build/ipa \
          -exportOptionsPlist ExportOptions.plist

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HeartFloat.ipa
        path: build/ipa/*.ipa
        retention-days: 7

    - name: Upload xcarchive
      uses: actions/upload-artifact@v4
      with:
        name: HeartFloat.xcarchive
        path: build/HeartFloat.xcarchive
        retention-days: 7