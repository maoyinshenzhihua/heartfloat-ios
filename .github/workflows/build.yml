name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Show available simulators
      run: xcrun simctl list devices available | head -30

    - name: Install CocoaPods
      run: |
        cd HeartFloat-iOS
        pod install

    - name: Build iOS Project
      run: |
        cd HeartFloat-iOS
        xcodebuild -workspace HeartFloat.xcworkspace \
          -scheme HeartFloat \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          build

    - name: Build IPA (Release)
      run: |
        cd HeartFloat-iOS
        mkdir -p build
        xcodebuild -workspace HeartFloat.xcworkspace \
          -scheme HeartFloat \
          -configuration Release \
          -sdk iphoneos \
          -archivePath build/HeartFloat.xcarchive \
          archive

    - name: Export IPA
      run: |
        cd HeartFloat-iOS
        xcodebuild -exportArchive \
          -archivePath build/HeartFloat.xcarchive \
          -exportPath build/ipa \
          -exportOptionsPlist ExportOptions.plist

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: HeartFloat.ipa
        path: HeartFloat-iOS/build/ipa/*.ipa
        retention-days: 7

    - name: Upload xcarchive
      uses: actions/upload-artifact@v3
      with:
        name: HeartFloat.xcarchive
        path: HeartFloat-iOS/build/HeartFloat.xcarchive
        retention-days: 7
