name: Build Unsigned IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  SCHEME: HeartFloat
  WORKSPACE: HeartFloat.xcworkspace
  BUNDLE_ID: com.heartfloat.HeartFloat

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install CocoaPods Dependencies
        if: hashFiles('Podfile') != ''
        run: pod install

      - name: Build (Unsigned)
        run: |
          xcodebuild build \
            -workspace "${{ env.WORKSPACE }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            | xcpretty

      - name: Package IPA (Unsigned)
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "${{ env.SCHEME }}.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "::error::App bundle not found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build && zip -r -q "../HeartFloat-unsigned.ipa" Payload
          cd ..

          echo "IPA_SIZE=$(du -h HeartFloat-unsigned.ipa | cut -f1)" >> $GITHUB_ENV

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-unsigned-${{ github.run_id }}
          path: HeartFloat-unsigned.ipa
          retention-days: 30

      - name: Upload App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-app-${{ github.run_id }}
          path: build/DerivedData/Build/Products/Release-iphoneos/*.app
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scheme | \`${{ env.SCHEME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle ID | \`${{ env.BUNDLE_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Signing | **Unsigned** (CODE_SIGNING_ALLOWED=NO) |" >> $GITHUB_STEP_SUMMARY
          echo "| IPA Size | \`${{ env.IPA_SIZE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
