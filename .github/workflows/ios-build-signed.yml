name: iOS Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List project structure
        run: |
          ls -la
          ls -la HeartFloat/ || true

      - name: Build unsigned archive
        run: |
          xcodebuild archive \
            -project HeartFloat.xcodeproj \
            -scheme HeartFloat \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/HeartFloat.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            VALIDATE_PRODUCT=NO \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            COPY_PHASE_STRIP=NO \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO \
            OTHER_CFLAGS="-fembed-bitcode-marker" \
            OTHER_LDFLAGS="" \
            | xcpretty

      - name: Show archive contents
        run: |
          echo "=== Archive structure ==="
          ls -laR build/HeartFloat.xcarchive/ || echo "Archive not found!"
          echo -e "\n=== App bundle contents ==="
          ls -laR build/HeartFloat.xcarchive/Products/Applications/HeartFloat.app/ 2>/dev/null || echo "App not found!"
          echo -e "\n=== Check for embedded frameworks ==="
          find build/HeartFloat.xcarchive/Products/Applications/HeartFloat.app -name "*.framework" -o -name "*.dylib" 2>/dev/null || echo "No embedded frameworks/dylibs"

      - name: Verify app binary exists
        run: |
          APP_PATH="build/HeartFloat.xcarchive/Products/Applications/HeartFloat.app/HeartFloat"
          if [ ! -f "$APP_PATH" ]; then
            echo "::error::App binary not found at $APP_PATH"
            echo "=== Searching for binary ==="
            find build/HeartFloat.xcarchive -type f -name "HeartFloat" -o -name "*.appex" 2>/dev/null
            exit 1
          fi
          BINARY_SIZE=$(stat -f%z "$APP_PATH")
          echo "App binary size: $BINARY_SIZE bytes"
          if [ "$BINARY_SIZE" -lt 10000 ]; then
            echo "::warning::App binary seems too small ($BINARY_SIZE bytes), build may be incomplete"
          fi

      - name: Package IPA manually
        run: |
          rm -rf build/ipa
          mkdir -p build/ipa/Payload

          APP_SRC="build/HeartFloat.xcarchive/Products/Applications/HeartFloat.app"
          if [ ! -d "$APP_SRC" ]; then
            echo "::error::HeartFloat.app not found in archive"
            exit 1
          fi

          echo "Copying app bundle..."
          cp -R "$APP_SRC" build/ipa/Payload/

          echo "Verifying copied app..."
          ls -laR build/ipa/Payload/HeartFloat.app/ | head -50

          echo "Creating IPA..."
          cd build/ipa
          zip -r ../HeartFloat-unsigned.ipa Payload -x "*.DS_Store"
          cd ../..

          echo "IPA created:"
          ls -lh build/HeartFloat-unsigned.ipa

      - name: Final artifact preparation
        run: |
          mv build/HeartFloat-unsigned.ipa build/HeartFloat.ipa
          echo "Final IPA:"
          ls -lh build/HeartFloat.ipa
          echo "IPA contents:"
          unzip -l build/HeartFloat.ipa | head -30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-unsigned-ipa
          path: build/HeartFloat.ipa
          retention-days: 30
