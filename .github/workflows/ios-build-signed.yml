name: Build iOS App (With Signing)

on:
  push:
    branches:
      - master
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build-signed.yml'
  workflow_dispatch:

env:
  XCODE_VERSION: '15.0'
  IOS_DEPLOYMENT_TARGET: '14.0'
  BUNDLE_ID: com.heartfloat.app
  SCHEME: HeartFloat

jobs:
  build-signed:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Generate Xcode project
        working-directory: ./ios/HeartFloat
        run: |
          if which xcodegen >/dev/null; then
            echo "XcodeGen is already installed"
          else
            brew install xcodegen
          fi
          xcodegen generate
          ls -la

      - name: Fix project format
        working-directory: ./ios/HeartFloat
        run: |
          find . -name "*.pbxproj" -exec sed -i '' 's/77/56/g' {} \;

      - name: Build
        working-directory: ./ios/HeartFloat
        run: |
          xcodebuild -project HeartFloat.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
          echo "=== Build Products ==="
          ls -la ./DerivedData/Build/Products/
          ls -la ./DerivedData/Build/Products/Release-iphoneos/

      - name: Create IPA
        working-directory: ./ios/HeartFloat
        run: |
          mkdir -p output
          APP_PATH=./DerivedData/Build/Products/Release-iphoneos/HeartFloat.app
          echo "=== Checking App Path ==="
          if [ -d "$APP_PATH" ]; then
            echo "App found at: $APP_PATH"
            echo "=== App Contents ==="
            ls -la "$APP_PATH"
            echo "=== App Size ==="
            du -sh "$APP_PATH"
            echo "=== Copying to output ==="
            cp -r "$APP_PATH" ./output/
            cd ./output
            mkdir -p Payload
            cp -r HeartFloat.app Payload/
            echo "=== Payload Contents ==="
            ls -la Payload/
            ls -la Payload/HeartFloat.app/
            zip -r ./HeartFloat-${{ github.run_number }}.ipa Payload
            echo "=== IPA Created ==="
            ls -la
            du -sh HeartFloat-${{ github.run_number }}.ipa
          else
            echo "ERROR: App not found at: $APP_PATH"
            find ./DerivedData -name "*.app" -type d 2>/dev/null
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-iOS-${{ github.run_number }}
          path: ios/HeartFloat/output/HeartFloat-${{ github.run_number }}.ipa
          retention-days: 30
