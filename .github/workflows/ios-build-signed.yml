name: iOS Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List project structure
        run: |
          ls -la
          ls -la HeartFloat/ || true

      - name: Build unsigned archive
        run: |
          xcodebuild archive \
            -project HeartFloat.xcodeproj \
            -scheme HeartFloat \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/HeartFloat.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO \
            | xcpretty

      - name: Show archive contents
        run: |
          echo "=== Archive structure ==="
          ls -la build/
          ls -la build/HeartFloat.xcarchive/
          ls -la build/HeartFloat.xcarchive/Products/
          ls -la build/HeartFloat.xcarchive/Products/Applications/
          echo -e "\n=== App bundle contents ==="
          ls -la build/HeartFloat.xcarchive/Products/Applications/HeartFloat.app/
          echo -e "\n=== Frameworks (if exists) ==="
          ls -la build/HeartFloat.xcarchive/Products/Applications/HeartFloat.app/Frameworks 2>/dev/null || echo "No Frameworks directory found!"

      - name: Export unsigned IPA
        run: |
          mkdir -p build/ipa

          xcodebuild -exportArchive \
            -archivePath build/HeartFloat.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates \
            | xcpretty || true

          if [ ! -d build/ipa ] || [ -z "$(ls -A build/ipa 2>/dev/null)" ]; then
            echo "::warning::Standard export failed, using manual IPA packaging..."
            rm -rf build/ipa
            mkdir -p build/ipa/Payload
            cp -R build/HeartFloat.xcarchive/Products/Applications/HeartFloat.app build/ipa/Payload/
            cd build/ipa && zip -r ../HeartFloat-unsigned.ipa Payload && cd ../..
          fi

      - name: Find and rename IPA artifact
        run: |
          if [ -f build/HeartFloat-unsigned.ipa ]; then
            mv build/HeartFloat-unsigned.ipa build/HeartFloat.ipa
          else
            IPA_FILE=$(find build/ipa -name "*.ipa" -type f 2>/dev/null | head -1)
            if [ -n "$IPA_FILE" ]; then
              cp "$IPA_FILE" build/HeartFloat.ipa
            else
              echo "::error::No IPA file found!"
              exit 1
            fi
          fi
          echo "IPA built successfully: $(du -h build/HeartFloat.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-unsigned-ipa
          path: build/HeartFloat.ipa
          retention-days: 30
